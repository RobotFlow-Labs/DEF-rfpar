[module]
name = "DEF-rfpar"
seed = 2

[execution]
backend = "cpu"
mode = "classification"
dry_run = true
output_dir = "outputs"

[paths]
reference_repo = "repositories/RFPAR"
imagenet_root = "repositories/RFPAR/ImageNet"
coco_root = "repositories/RFPAR/COCO/images/val"
argoverse_root = "/mnt/forge-data/shared_infra/datasets/argoverse"

[attack]
max_iterations = 100
bound_threshold_eta = 0.05
alpha = 0.01
convergence_duration_t = 3
query_budget = 1500
yolo_conf_threshold = 0.5
