[module]
name = "DEF-rfpar"
seed = 2

[execution]
backend = "cuda"
mode = "detection"
dry_run = true
output_dir = "outputs/paper"

[paths]
reference_repo = "repositories/RFPAR"
imagenet_root = "/mnt/forge-data/shared_infra/datasets/imagenet1k"
coco_root = "/mnt/forge-data/shared_infra/datasets/coco2017/val2017"
argoverse_root = "/mnt/forge-data/shared_infra/datasets/argoverse"

[attack]
max_iterations = 100
bound_threshold_eta = 0.05
alpha = 0.05
convergence_duration_t = 20
query_budget = 1700
yolo_conf_threshold = 0.5
